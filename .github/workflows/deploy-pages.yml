name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BLOG_CONTENT_REPO: ${{ vars.BLOG_CONTENT_REPO }}
    steps:
      - name: Checkout site repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate content repository setting
        run: |
          if [ -z "${BLOG_CONTENT_REPO}" ]; then
            echo "Missing repository variable BLOG_CONTENT_REPO."
            echo "Set it to the public content repo, for example: a1667834841/blog-content"
            exit 1
          fi

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.159.2"
          extended: true

      - name: Checkout content repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.BLOG_CONTENT_REPO }}
          path: blog-content
          fetch-depth: 1

      - name: Sync content into site
        env:
          CONTENT_REPO: ${{ github.workspace }}/blog-content
        run: ./scripts/sync-content.sh

      - name: Build site
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

