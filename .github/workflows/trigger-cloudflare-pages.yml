name: Trigger Cloudflare Pages Deploy

on:
  schedule:
    - cron: "10 2 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy hook secret
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${CLOUDFLARE_PAGES_DEPLOY_HOOK_URL}" ]; then
            echo "Missing secret CLOUDFLARE_PAGES_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger Cloudflare Pages build
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            "${CLOUDFLARE_PAGES_DEPLOY_HOOK_URL}"

