baseURL: "/"
languageCode: "zh-cn"
title: "ggball"
theme: "PaperMod"
pagination:
  pagerSize: 10
enableRobotsTXT: true
buildDrafts: false
hasCJKLanguage: true
defaultContentLanguage: "zh-cn"
outputs:
  home:
    - HTML
    - RSS
    - JSON
taxonomies:
  tag: "tags"
  category: "categories"
params:
